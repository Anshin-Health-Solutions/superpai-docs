# InfisicalSecret CR for superpai-docs namespace
#
# NOTE: This file is NOT applied by CI/CD.
# The docs site is a static nginx container — no runtime secrets needed.
# The registry pull secret is created directly in docs:deploy from CI credentials:
#
#   kubectl create secret docker-registry superpai-docs-registry \
#     --docker-server=$CI_REGISTRY \
#     --docker-username=$CI_REGISTRY_USER \
#     --docker-password=$CI_REGISTRY_PASSWORD \
#     -n superpai-docs --dry-run=client -o yaml | kubectl apply -f -
#
# Registry credentials are also stored in Infisical for reference/DR purposes:
#   Project: SuperPAI (projectSlug: super-pai-xc0g)
#   Environment: dev
#   Path: /registry
#   Keys: REGISTRY_SERVER, REGISTRY_USER, REGISTRY_PASSWORD
#
# If you ever need to create the pull secret manually without CI:
#   1. Get credentials from Infisical /superpai/registry
#   2. Run: kubectl create secret docker-registry superpai-docs-registry \
#             --docker-server=registry.anshinhealth.net \
#             --docker-username=<REGISTRY_USER> \
#             --docker-password=<REGISTRY_PASSWORD> \
#             -n superpai-docs
#
# Credentials (clientId/clientSecret) for pai-claude-code-auth machine identity
# are stored in K8s secret: infisical-operator/pai-claude-code-auth
---
# Kept for reference only — applied manually if needed, not by CI
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: superpai-docs-registry-sync
  namespace: superpai-docs
spec:
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
  resyncInterval: 300
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: super-pai-xc0g
        envSlug: dev
        secretsPath: /registry
      credentialsRef:
        secretName: pai-claude-code-auth
        secretNamespace: infisical-operator
  managedSecretReference:
    secretName: superpai-docs-registry-raw
    secretNamespace: superpai-docs
    secretType: Opaque
    creationPolicy: Owner
